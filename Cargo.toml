[package]
name = "TakeFlight"
version = "0.1.0"
edition = "2024"


[dependencies]
takeflight_computer_vision = { path= "src/takeflight_computer_vision" }

mio = { version="1.0.4", features = ["net", "os-poll"] }
local-ip-address = "0.6.8"
openh264 = "0.9.0"
image = { version="0.25.8", features = ["png", "jpeg"] }
rusqlite = { version="0.37.0", features = ["bundled", "chrono"]}
concat-arrays = "0.1.2"
mio-wakeq = "0.1.0"
#opencv = { version="0.97.2"}

# This section is just to make the code more expressive.
zerocopy = "0.8.27"	# This is for low-level byte operations on primitive types
lebe = "0.5.3"	# For endian conversion
chrono = "0.4.42"	# For simplifying time operations (should be the same interface as C++).
num_enum = "0.7.5"	# For simplifying pattern matching for arbitrary (network) data.
anyhow = "1.0.100"	# I wish we had started with anyhow, this implements Error for most error types (not concurrent errors like MutexPoison, though...).
const_format = "0.2.35"	# Allows compile-time string formatting.
serde = { version="1.0.228", features = ["serde_derive"] }	# Serialize/Deserialize using reflection.
serde_json = "1.0.145" # Extends serde.

[dev-dependencies]
nokhwa = { version="0.10.10", features = ["input-native"] }
rstest = "0.26.1"

[build-dependencies]
rusqlite = { version="0.37.0", features = ["bundled"]}
anyhow = "1.0.100"
const_format = "0.2.35"

[profile.test]
opt-level = 3

#[[test]]
#name="camera_conversion_tests"
#path="src/tests/camera_conversion_test.rs"
